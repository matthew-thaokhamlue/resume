<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -40 960 760" role="img" aria-labelledby="title desc">
  <title id="title">Minimal natural-language intent workflow</title>
  <desc id="desc">Natural scientist speech is interpreted by an LLM into a structured lab workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a1014"/><stop offset="1" stop-color="#122029"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6cc7e9" stop-opacity=".18"/><stop offset=".5" stop-color="#6cc7e9"/><stop offset="1" stop-color="#f3f5f7" stop-opacity=".7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000" flood-opacity=".35"/></filter>
    <style>
      .card{fill:#0e171c;stroke:#fff;stroke-opacity:.12}.muted{fill:#8b969e;font:600 13px Space Grotesk,system-ui,sans-serif;letter-spacing:2.4px}.text{fill:#f3f5f7;font:700 24px Space Grotesk,system-ui,sans-serif}.small{fill:#c7cfd5;font:500 16px Space Grotesk,system-ui,sans-serif}.thin{fill:none;stroke-linecap:round;stroke-linejoin:round}.soft{stroke:#fff;stroke-opacity:.18}.accent{stroke:#6cc7e9}
    </style>
  </defs>
  <rect y="-40" width="960" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="480" cy="320" r="248" fill="#6cc7e9" opacity=".045"/>

  <g transform="translate(98 180)" filter="url(#shadow)">
    <rect width="260" height="236" rx="30" class="card"/>
    <text x="28" y="44" class="muted">SCIENTIST SAYS</text>
    <rect x="28" y="76" width="204" height="48" rx="24" fill="#fff" fill-opacity=".045" stroke="#fff" stroke-opacity=".10"/>
    <text x="48" y="107" class="small">“around fifty...”</text>
    <rect x="28" y="142" width="184" height="48" rx="24" fill="#6cc7e9" fill-opacity=".10" stroke="#6cc7e9" stroke-opacity=".26"/>
    <text x="48" y="173" class="small">“buffer solution”</text>
  </g>

  <path d="M358 300C424 284 458 292 500 320" class="thin" stroke="url(#line)" stroke-width="3"/>
  <g transform="translate(386 94)">
    <g class="thin">
      <path d="M150 46C222 38 290 84 318 148C346 212 324 288 268 330C212 372 128 378 74 334C20 290 2 208 30 144C58 80 82 54 150 46Z" class="soft"/>
      <path d="M150 96C200 92 248 122 268 168C288 214 272 266 232 296C192 326 132 330 92 298C52 266 40 210 60 164C80 120 102 100 150 96Z" class="accent" stroke-opacity=".35"/>
    </g>
    <circle cx="150" cy="198" r="70" fill="#6cc7e9" fill-opacity=".08" stroke="#6cc7e9" stroke-opacity=".28"/>
    <path d="M110 200L142 160L190 182L202 228L154 252L116 230Z M142 160L154 252 M190 182L116 230" class="thin accent" stroke-width="2" stroke-opacity=".72"/>
    <text x="150" y="204" text-anchor="middle" class="text" font-size="30">LLM</text>
  </g>
  <path d="M596 320C654 306 688 292 740 258" class="thin" stroke="url(#line)" stroke-width="3"/>

  <g transform="translate(716 168)" filter="url(#shadow)">
    <rect width="188" height="284" rx="30" class="card"/>
    <text x="28" y="44" class="muted">STRUCTURE</text>
    <text x="28" y="94" class="small">intent</text><text x="28" y="122" class="text" font-size="21">log usage</text>
    <line x1="28" y1="150" x2="160" y2="150" class="thin soft"/>
    <text x="28" y="188" class="small">quantity</text><text x="28" y="216" class="text" font-size="21">50 ml</text>
    <path d="M126 242l12 12 26-36" class="thin accent" stroke-width="4"/>
  </g>
</svg>
