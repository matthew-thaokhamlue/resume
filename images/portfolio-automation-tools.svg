<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Minimal connected automation gears</title>
  <desc id="desc">Three minimal connected gears in small, medium, and large sizes representing AI-powered automation tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1014"/>
      <stop offset="1" stop-color="#122029"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6cc7e9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6cc7e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.423 0 0 0 0 0.780 0 0 0 0 0.914 0 0 0 .42 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="gear" d="M0 -100L20.2 -75.3L50 -86.6L55.2 -55.2L86.6 -50L75.3 -20.2L100 0L75.3 20.2L86.6 50L55.2 55.2L50 86.6L20.2 75.3L0 100L-20.2 75.3L-50 86.6L-55.2 55.2L-86.6 50L-75.3 20.2L-100 0L-75.3 -20.2L-86.6 -50L-55.2 -55.2L-50 -86.6L-20.2 -75.3Z"/>
    <style>
      .gear{fill:#6cc7e9;fill-opacity:.10;stroke:#6cc7e9;stroke-opacity:.55;stroke-width:4;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .hole{fill:#0d171d;stroke:#f3f5f7;stroke-opacity:.14;stroke-width:3;vector-effect:non-scaling-stroke}
      .link{fill:none;stroke:#6cc7e9;stroke-opacity:.16;stroke-width:8;stroke-linecap:round}
    </style>
  </defs>

  <rect width="960" height="600" rx="34" fill="url(#bg)"/>
  <circle cx="480" cy="300" r="230" fill="url(#halo)"/>

  <g filter="url(#glow)">
    <path d="M410 350L570 230L660 330" class="link"/>

    <g transform="translate(410 350) rotate(8) scale(1.25)">
      <use href="#gear" class="gear"/>
      <circle r="34" class="hole"/>
    </g>

    <g transform="translate(570 230) rotate(-12) scale(.86)">
      <use href="#gear" class="gear" fill-opacity=".09"/>
      <circle r="34" class="hole"/>
    </g>

    <g transform="translate(660 330) rotate(18) scale(.62)">
      <use href="#gear" class="gear" fill-opacity=".08"/>
      <circle r="34" class="hole"/>
    </g>
  </g>
</svg>
