<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Abstract converging paths leading to a doorway of light">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1013"/>
      <stop offset="1" stop-color="#14171c"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2e2c4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#c8a86a" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#e8d3a8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e8d3a8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <!-- converging paths -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M -40 980 C 220 860, 330 700, 385 520" stroke-width="1.4" opacity="0.34"/>
    <path d="M 120 1020 C 300 880, 360 720, 392 530" stroke-width="1.0" opacity="0.22"/>
    <path d="M 840 960 C 600 850, 480 700, 416 520" stroke-width="1.4" opacity="0.34"/>
    <path d="M 700 1020 C 540 880, 460 730, 410 535" stroke-width="1.0" opacity="0.22"/>
    <path d="M 400 1020 L 400 545" stroke-width="0.8" opacity="0.16" stroke-dasharray="2 10"/>
  </g>
  <!-- doorway -->
  <rect x="352" y="330" width="96" height="200" rx="4" fill="url(#door)"/>
  <rect x="340" y="318" width="120" height="224" rx="6" fill="none" stroke="#e8d3a8" stroke-opacity="0.28" stroke-width="1.2"/>
  <!-- horizon hairline -->
  <line x1="60" y1="530" x2="340" y2="530" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="460" y1="530" x2="740" y2="530" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <!-- scattered stars / opportunities -->
  <g fill="#ffffff">
    <circle cx="170" cy="220" r="1.6" opacity="0.28"/>
    <circle cx="620" cy="160" r="1.3" opacity="0.22"/>
    <circle cx="540" cy="300" r="1.1" opacity="0.18"/>
    <circle cx="250" cy="360" r="1.4" opacity="0.22"/>
    <circle cx="680" cy="420" r="1.2" opacity="0.18"/>
    <circle cx="120" cy="470" r="1.0" opacity="0.16"/>
  </g>
</svg>
