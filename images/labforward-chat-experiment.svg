<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -40 960 760" role="img" aria-labelledby="title desc">
  <title id="title">Minimal Chat with Experiment workflow</title>
  <desc id="desc">A scientist prompt is routed through agent work into validated experiment fields.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a1014"/><stop offset="1" stop-color="#122029"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6cc7e9" stop-opacity=".18"/><stop offset=".5" stop-color="#6cc7e9"/><stop offset="1" stop-color="#f3f5f7" stop-opacity=".7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000" flood-opacity=".35"/></filter>
    <style>.card{fill:#0e171c;stroke:#fff;stroke-opacity:.12}.muted{fill:#8b969e;font:600 13px Space Grotesk,system-ui,sans-serif;letter-spacing:2.4px}.text{fill:#f3f5f7;font:700 24px Space Grotesk,system-ui,sans-serif}.small{fill:#c7cfd5;font:500 16px Space Grotesk,system-ui,sans-serif}.thin{fill:none;stroke-linecap:round;stroke-linejoin:round}.soft{stroke:#fff;stroke-opacity:.18}.accent{stroke:#6cc7e9}</style>
  </defs>
  <rect y="-40" width="960" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="484" cy="318" r="250" fill="#6cc7e9" opacity=".045"/>

  <g transform="translate(100 198)" filter="url(#shadow)">
    <rect width="254" height="196" rx="30" class="card"/>
    <text x="28" y="44" class="muted">ASK</text>
    <rect x="28" y="78" width="198" height="72" rx="24" fill="#6cc7e9" fill-opacity=".10" stroke="#6cc7e9" stroke-opacity=".26"/>
    <text x="48" y="108" class="text" font-size="20">copy buffer</text>
    <text x="48" y="136" class="small">from last run</text>
  </g>
  <path d="M354 296C420 282 456 290 502 320" class="thin" stroke="url(#line)" stroke-width="3"/>

  <g transform="translate(390 98)">
    <g class="thin">
      <path d="M150 46C222 38 290 84 318 148C346 212 324 288 268 330C212 372 128 378 74 334C20 290 2 208 30 144C58 80 82 54 150 46Z" class="soft"/>
      <path d="M150 100C198 96 244 126 264 170C284 214 270 266 232 294C194 324 134 328 96 298C56 268 44 214 64 168C84 124 104 104 150 100Z" class="accent" stroke-opacity=".34"/>
    </g>
    <circle cx="150" cy="198" r="70" fill="#6cc7e9" fill-opacity=".08" stroke="#6cc7e9" stroke-opacity=".30"/>
    <text x="150" y="204" text-anchor="middle" class="text" font-size="26">AGENT</text>
    <text x="150" y="330" text-anchor="middle" class="muted">RETRIEVE · REASON · EXECUTE</text>
  </g>
  <path d="M596 320C654 304 690 286 744 248" class="thin" stroke="url(#line)" stroke-width="3"/>

  <g transform="translate(714 160)" filter="url(#shadow)">
    <rect width="190" height="306" rx="30" class="card"/>
    <text x="28" y="44" class="muted">FORM</text>
    <text x="28" y="94" class="small">buffer</text><text x="28" y="122" class="text" font-size="22">PBS 1x</text>
    <line x1="28" y1="150" x2="160" y2="150" class="thin soft"/>
    <text x="28" y="190" class="small">volume</text><text x="28" y="218" class="text" font-size="22">50 ml</text>
    <path d="M122 254l14 14 30-42" class="thin accent" stroke-width="4"/>
  </g>
</svg>
