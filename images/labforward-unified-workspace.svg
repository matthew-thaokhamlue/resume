<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -40 960 760" role="img" aria-labelledby="title desc">
  <title id="title">Minimal unified lab workspace</title>
  <desc id="desc">IoT controls and experiment execution converge into one workspace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a1014"/><stop offset="1" stop-color="#122029"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6cc7e9" stop-opacity=".18"/><stop offset=".5" stop-color="#6cc7e9"/><stop offset="1" stop-color="#f3f5f7" stop-opacity=".7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000" flood-opacity=".35"/></filter>
    <style>.card{fill:#0e171c;stroke:#fff;stroke-opacity:.12}.muted{fill:#8b969e;font:600 13px Space Grotesk,system-ui,sans-serif;letter-spacing:2.4px}.text{fill:#f3f5f7;font:700 24px Space Grotesk,system-ui,sans-serif}.small{fill:#c7cfd5;font:500 16px Space Grotesk,system-ui,sans-serif}.thin{fill:none;stroke-linecap:round;stroke-linejoin:round}.soft{stroke:#fff;stroke-opacity:.18}.accent{stroke:#6cc7e9}</style>
  </defs>
  <rect y="-40" width="960" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="500" cy="320" r="250" fill="#6cc7e9" opacity=".045"/>

  <g transform="translate(104 158)" filter="url(#shadow)">
    <rect width="218" height="136" rx="28" class="card"/>
    <text x="26" y="42" class="muted">TAB 01</text>
    <text x="26" y="82" class="text">IoT</text>
    <path d="M108 82h62M138 52v60" class="thin accent" stroke-width="5"/>
  </g>
  <g transform="translate(104 382)" filter="url(#shadow)">
    <rect width="218" height="136" rx="28" class="card"/>
    <text x="26" y="42" class="muted">TAB 02</text>
    <text x="26" y="82" class="text">Experiment</text>
    <path d="M28 106h138" class="thin accent" stroke-width="5"/>
  </g>

  <path d="M322 226C398 232 442 260 498 314" class="thin" stroke="url(#line)" stroke-width="3"/>
  <path d="M322 450C398 420 442 376 498 326" class="thin" stroke="url(#line)" stroke-width="3"/>

  <g transform="translate(486 136)" filter="url(#shadow)">
    <rect width="360" height="368" rx="32" class="card"/>
    <text x="32" y="52" class="muted">UNIFIED</text>
    <text x="32" y="96" class="text" font-size="28">Lab Workspace</text>
    <line x1="32" y1="126" x2="328" y2="126" class="thin soft"/>
    <rect x="32" y="164" width="130" height="86" rx="22" fill="#fff" fill-opacity=".045" stroke="#fff" stroke-opacity=".10"/>
    <text x="56" y="212" class="small">device</text>
    <rect x="198" y="164" width="130" height="86" rx="22" fill="#fff" fill-opacity=".045" stroke="#fff" stroke-opacity=".10"/>
    <text x="224" y="212" class="small">run</text>
    <rect x="32" y="282" width="296" height="54" rx="27" fill="#6cc7e9" fill-opacity=".10" stroke="#6cc7e9" stroke-opacity=".30"/>
    <text x="56" y="317" class="small">one place to run the lab</text>
  </g>
</svg>
